<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Exam Monitoring System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>Exam Hall Monitoring System</h1>
    <div class="top-controls">
        <button onclick="startWebcam()">🎥 Live Webcam</button>
        <input type="file" id="videoFile" accept="video/*">
        <button onclick="uploadVideo()">📁 Upload Video</button>
    </div>
    <div class="video-container">
        <!-- ✅ Use <img> not <video> for MJPEG streams -->
        <img id="videoStream" alt="Video Stream" style="max-width:100%;">
    </div>
    <div class="alert-box">
        🚨 Alerts
        <p id="alertText">No cheating detected</p>
    </div>
    <audio id="alarmSound" src="/static/alarm.mp3"></audio>
    <script src="/static/script.js"></script>
</body>
</html>
